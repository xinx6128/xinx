<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三维矩阵动态全栈系统</title>
<!-- 引入 Supabase 核心脚本 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- 引入免责声明 UI 需要的 Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<style>
    * { box-sizing: border-box; font-family: sans-serif; }
    
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #1a2233; background-position: center; background-size: cover; background-repeat: no-repeat; background-image: url('1.png'); -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    @media (min-width: 1024px) { body { background-image: url('2.png'); } }
    
    /* =========================================
       💡 1. 全局加载动画遮罩层 
    ========================================= */
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 9998; }
    .wrapper { width: 200px; height: 60px; position: relative; z-index: 1; }
    .circle { width: 20px; height: 20px; position: absolute; border-radius: 50%; background-color: #fff; left: 15%; transform-origin: 50%; animation: circle7124 .5s alternate infinite ease; }
    @keyframes circle7124 { 0% { top: 60px; height: 5px; border-radius: 50px 50px 25px 25px; transform: scaleX(1.7); } 40% { height: 20px; border-radius: 50%; transform: scaleX(1); } 100% { top: 0%; } }
    .circle:nth-child(2) { left: 45%; animation-delay: .2s; }
    .circle:nth-child(3) { left: auto; right: 15%; animation-delay: .3s; }
    .shadow { width: 20px; height: 4px; border-radius: 50%; background-color: rgba(0,0,0,0.9); position: absolute; top: 62px; transform-origin: 50%; z-index: -1; left: 15%; filter: blur(1px); animation: shadow046 .5s alternate infinite ease; }
    @keyframes shadow046 { 0% { transform: scaleX(1.5); } 40% { transform: scaleX(1); opacity: .7; } 100% { transform: scaleX(.2); opacity: .4; } }
    .shadow:nth-child(4) { left: 45%; animation-delay: .2s; }
    .shadow:nth-child(5) { left: auto; right: 15%; animation-delay: .3s; }

    /* =========================================
       🚨 2. 自定义 UI 报错弹窗 (Uiverse 魔改版)
    ========================================= */
    #custom-alert-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
        display: none; justify-content: center; align-items: center;
        z-index: 9999; opacity: 0; transition: opacity 0.3s ease;
    }

    .alert-card {
        --border-radius: 0.75rem;
        --primary-color: #7257fa;
        --secondary-color: #3c3852;
        width: 280px; font-family: "Arial", sans-serif; padding: 1.5rem;
        border-radius: var(--border-radius); background: #f1f1f3; box-shadow: 0px 15px 30px rgba(0, 0, 0, 0.4);
        position: relative; transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .alert-card > * + * { margin-top: 1.1em; }
    .alert-card .alert__content { color: var(--secondary-color); font-size: 0.95rem; line-height: 1.5; }
    .alert-card .alert__title { padding: 0; font-size: 1.3rem; font-weight: bold; color: #111;}
    .alert-card .alert__arrow {
        position: absolute; background: var(--primary-color);
        padding: 0.6rem; border-top-left-radius: var(--border-radius); border-bottom-right-radius: var(--border-radius);
        bottom: 0; right: 0; transition: 0.2s; display: flex; justify-content: center; align-items: center; cursor: pointer;
    }
    .alert-card .alert__arrow svg { transition: 0.2s; stroke: #fff; }
    .alert-card:hover .alert__title { color: var(--primary-color); text-decoration: underline; }
    .alert-card:hover .alert__arrow { background: #111; }
    .alert-card:hover .alert__arrow svg { transform: translateX(3px); }

    /* =========================================
       ⚖️ 新增：免责声明弹窗专用全屏遮罩
    ========================================= */
    #disclaimer-modal-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(24, 24, 27, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        display: none; justify-content: center; align-items: center;
        z-index: 9990;
    }

    /* =========================================
       💡 3. 3D 矩阵核心大框
    ========================================= */
    .card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 680px; height: 500px; perspective: 1500px; animation: fadeInFromBottom 0.8s ease-out forwards; opacity: 0; }
    @keyframes fadeInFromBottom { 0% { opacity: 0; transform: translate(-50%, -40%); } 100% { opacity: 1; transform: translate(-50%, -50%); } }
    .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .card.flipped-reg .card-inner { transform: rotateY(180deg); }
    .card.flipped-forgot .card-inner { transform: rotateX(180deg); }

    .card-front, .card-back, .card-forgot { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: row; align-items: stretch; overflow: hidden; border-radius: 40px; box-shadow: 0 10px 35px rgba(0,0,0,0.3); }
    .card-front { background: rgba(106, 44, 112, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 2px solid #fff; transform: rotateY(0deg); }
    .card-back { background: rgba(240, 138, 93, 0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 2px solid #fff; transform: rotateY(180deg); }
    .card-forgot { background: rgba(40, 116, 166, 0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 2px solid #fff; transform: rotateX(180deg); }

    .form-section { flex: 1.3; padding: 30px 20px 30px 25px; display: flex; flex-direction: column; justify-content: center; }
    .character-section { flex: 0.7; position: relative; display: flex; align-items: flex-end; justify-content: flex-end; overflow: hidden; }
    .character-section img { position: absolute; object-fit: contain; transition: opacity 0.3s ease-in-out; mix-blend-mode: screen; pointer-events: none; }
    .card-front #char2-login { height: 120%; max-width: 150%; right: -20px; bottom: -15px; }
    .card-front #char3-login { height: 95%; max-width: 130%; right: -10px; bottom: -15px; }
    .card-back #char2-reg { height: 120%; max-width: 150%; right: -20px; bottom: -15px; }
    .card-back #char3-reg { height: 95%; max-width: 130%; right: -10px; bottom: -15px; }
    .card-forgot #char2-forgot { height: 120%; max-width: 150%; right: -20px; bottom: -15px; }
    .card-forgot #char3-forgot { height: 95%; max-width: 130%; right: -10px; bottom: -15px; }

    .title { color: #fff; font-size: 26px; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); }
    .action-group { display: flex; align-items: center; justify-content: space-between; margin-top: 25px; }
    .link-text { color: #eee; font-size: 13px; cursor: pointer; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); position: relative; z-index: 10; padding: 5px; }
    .link-text span { font-weight: bold; font-size: 16px; color: #fff; text-decoration: underline; }

    /* =========================================
       💡 4. Uiverse 悬浮底边框输入框
    ========================================= */
    .input-container { position: relative; margin-bottom: 20px; width: 100%; }
    .input-field { display: block; width: 100%; padding: 10px 10px 5px 5px; font-size: 16px; color: #fff; border: none; border-bottom: 2px solid rgba(255, 255, 255, 0.3); outline: none; background-color: transparent; transition: all 0.3s ease; position: relative; z-index: 5; }
    .input-label { position: absolute; top: 8px; left: 5px; font-size: 15px; color: rgba(255, 255, 255, 0.7); pointer-events: none; transition: all 0.3s ease; z-index: 4; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    .input-highlight { position: absolute; bottom: 0; left: 0; height: 2px; width: 0; background-color: #fff; transition: all 0.3s ease; box-shadow: 0 0 8px rgba(255, 255, 255, 0.8); z-index: 6; }
    .input-field:focus + .input-label, .input-field:not(:placeholder-shown) + .input-label { top: -16px; font-size: 12px; color: #fff; font-weight: bold; }
    .input-field:focus ~ .input-highlight { width: 100%; }

    /* =========================================
       ✨ 修复：因 Tailwind 导致的登录/注册/修改按钮样式丢失
    ========================================= */
    #login-btn, #do-reg, #do-reset {
        display: inline-block;
        background-color: rgba(255, 255, 255, 0.85); 
        color: #2e1a47;                               
        padding: 10px 28px;                           
        border-radius: 20px;                          
        border: 1px solid rgba(255, 255, 255, 0.4);   
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);   
    }
    #login-btn:hover, #do-reg:hover, #do-reset:hover {
        background-color: #fff;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(255, 255, 255, 0.25);
    }
    #login-btn:active, #do-reg:active, #do-reset:active {
        transform: translateY(1px);
        background-color: rgba(255, 255, 255, 0.7);
    }
</style>
</head>
<body>

<!-- =========================================
   🚨 1. 自定义 UI 报错弹窗 (Uiverse 魔改版)
========================================= -->
<div id="custom-alert-overlay">
    <div class="alert-card">
        <div class="alert__title">系统提示</div>
        <div class="alert__content" id="alert-msg">这里是报错信息</div>
        <div class="alert__arrow" onclick="closeCustomAlert()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>

</div>

        <div class="shadow"></div><div class="shadow"></div><div class="shadow"></div>
    </div>
</div>

<div id="disclaimer-modal-overlay">

                    <path fill="#644647" d="M54.962 34.3a17.719 17.719 0 01-2.602 2.378.954.954 0 001.14 1.53 19.637 19.637 0 002.884-2.634.955.955 0 00-1.422-1.274z"></path>

                </svg>
            </span>

            <h5 class="text-base font-semibold mb-2 text-left mr-auto text-zinc-800">服务协议与隐私保护</h5>

            <p class="w-full mb-4 text-xs text-justify text-zinc-600 leading-relaxed">
                为了保障您的数码设备交易及后台系统的运行安全，我们需要收集您的必要登录数据。请在登录前仔细阅读完整政策。
                <br />
                点击继续即代表您完全理解并同意我们的
                <a href="/disclaimer.pdf" target="_blank" class="mt-1 inline-block text-xs font-semibold transition-colors text-[#9C6750] hover:text-[#634647] underline underline-offset-2">《免责声明与隐私政策》</a>

                <button class="font-semibold cursor-pointer py-1.5 px-5 w-auto text-xs rounded-lg transition-colors text-[#634647] hover:text-[#ddad81] bg-[#ddad81] hover:bg-[#634647] shadow-sm border-none" type="button" onclick="confirmDisclaimerAndLogin()">

                </button>

<!-- =========================================
   💡 4. 3D 矩阵核心大框
========================================= -->
<div class="card" id="main-card">
    <div class="card-inner">
        <div class="card-front">
            <div class="form-section">
                <div class="title">账号登录</div>
                <div class="input-container">
                    <input type="text" id="login-acc" class="input-field" placeholder=" ">
                    <label class="input-label">账号</label>
                    <span class="input-highlight"></span>
                </div>
                <div class="input-container">
                    <input type="password" id="login-pwd" class="input-field" placeholder=" " style="padding-right: 40px;">
                    <label class="input-label">密码</label>
                    <span class="input-highlight"></span>
                    <div id="toggle-login-pwd" style="position: absolute; right: 5px; top: 5px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </div>
                </div>
                <div class="action-group">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button id="login-btn" type="button" onclick="showDisclaimerModal()">登录</button>
                        <div class="link-text" id="go-reg-btn">没有账号？<br><span>点这里去注册</span></div>
                    </div>
                    <div class="link-text" id="go-forgot-btn" style="text-align: right;">忘记密码？</div>
                </div>
            </div>
            <div class="character-section">
                <img id="char2-login" src="image_2.png" style="opacity: 1;">
                <img id="char3-login" src="image_3.png" style="opacity: 0;">
            </div>
        </div>

        <div class="card-back" style="display: none;">
            <div class="form-section">
                <div class="title">注册新账号</div>
                <div class="input-container">
                    <input type="text" id="reg-acc" class="input-field" placeholder=" ">
                    <label class="input-label">用户名 (限字母和数字)</label>
                    <span class="input-highlight"></span>
                </div>
                <div class="input-container">
                    <input type="email" id="reg-email" class="input-field" placeholder=" ">
                    <label class="input-label">电子邮箱</label>
                    <span class="input-highlight"></span>
                </div>
                <div class="input-container">
                    <input type="password" id="reg-pwd" class="input-field" placeholder=" ">
                    <label class="input-label">设置密码 (包含英文字母)</label>
                    <span class="input-highlight"></span>
                </div>
                <div class="input-container">
                    <input type="password" id="reg-pwd2" class="input-field" placeholder=" ">
                    <label class="input-label">确认密码</label>
                    <span class="input-highlight"></span>
                </div>
                <div class="action-group">
                    <button id="do-reg" type="button">注册</button>
                    <div class="link-text" id="go-login-btn1">已有账号？<br><span>返回登录</span></div>
                </div>
            </div>
            <div class="character-section">
                <img id="char2-reg" src="image_2.png" style="opacity: 1;">
                <img id="char3-reg" src="image_3.png" style="opacity: 0;">
            </div>
        </div>

        <div class="card-forgot" style="display: none;">
            <div class="form-section">
                <div class="title">重置密码</div>
                <div class="input-container">
                    <input type="text" id="find-acc" class="input-field" placeholder=" ">
                    <label class="input-label">确认账号</label>
                    <span class="input-highlight"></span>
                </div>
                <div class="input-container">
                    <input type="email" id="find-email" class="input-field" placeholder=" ">
                    <label class="input-label">确认注册邮箱</label>
                    <span class="input-highlight"></span>
                </div>
                <div class="input-container">
                    <input type="password" id="new-pwd" class="input-field" placeholder=" ">
                    <label class="input-label">设置新密码 (最少5位)</label>
                    <span class="input-highlight"></span>
                </div>
                <div class="action-group">
                    <button id="do-reset" type="button">确认修改</button>
                    <div class="link-text" id="go-login-btn2">想起来了？<br><span>返回登录</span></div>
                </div>
            </div>
            <div class="character-section">
                <img id="char2-forgot" src="image_2.png" style="opacity: 1;">
                <img id="char3-forgot" src="image_3.png" style="opacity: 0;">
            </div>
        </div>
    </div>
</div>

<script>
// =========================================
// 💡 JS 黑科技：拦截并覆盖浏览器原生 alert
// =========================================
window.alert = function(message) {
    hideLoading(); 
    document.getElementById('alert-msg').innerText = message;
    const overlay = document.getElementById('custom-alert-overlay');
    overlay.style.display = 'flex';
    setTimeout(() => {
        overlay.style.opacity = '1';
        document.querySelector('.alert-card').style.transform = 'scale(1)';
    }, 10);
};

function closeCustomAlert() {
    const overlay = document.getElementById('custom-alert-overlay');
    overlay.style.opacity = '0';
    document.querySelector('.alert-card').style.transform = 'scale(0.8)';
    setTimeout(() => { overlay.style.display = 'none'; }, 300);
}

// =========================================
// ⚖️ 免责声明弹窗显示/隐藏控制逻辑
// =========================================
const disclaimerOverlay = document.getElementById('disclaimer-modal-overlay');

function showDisclaimerModal() {
    const a = document.getElementById('login-acc').value.trim();
    const p = document.getElementById('login-pwd').value.trim();
    if(!a || !p) { alert('填完整账号和密码！'); return; }
    
    // 账号密码填写完毕后，拦截后续，呼出新协议卡片
    disclaimerOverlay.style.display = 'flex';
}

function closeDisclaimerModal() {
    disclaimerOverlay.style.display = 'none';
}

function confirmDisclaimerAndLogin() {
    closeDisclaimerModal();
    // 用户同意协议，正式核对 Supabase
    executeActualLogin();
}

// =========================================
// 1. Supabase 初始化与凭证
// =========================================
const SUPABASE_URL = 'https://oaihccykfaftbmzdzvdj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9haWhjY3lrZmFmdGJtemR6dmRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTMyMTEsImV4cCI6MjA5NDY4OTIxMX0._iJWw5ImklKMUQF2i30um4Iwxv4tpoo63qsZgLKpSgQ'; 
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const loadingOverlay = document.getElementById('loading-overlay');
function showLoading() { loadingOverlay.style.display = 'flex'; }
function hideLoading() { loadingOverlay.style.display = 'none'; }

// =========================================
// 2. 物理隔离版 3D 翻转引擎
// =========================================
const card = document.getElementById('main-card');
const backFace = document.querySelector('.card-back');
const forgotFace = document.querySelector('.card-forgot');

document.getElementById('go-reg-btn').onclick = function() { 
    forgotFace.style.display = 'none'; backFace.style.display = 'flex'; 
    setTimeout(() => { card.className = 'card flipped-reg'; }, 20); 
}
document.getElementById('go-forgot-btn').onclick = function() { 
    backFace.style.display = 'none'; forgotFace.style.display = 'flex'; 
    setTimeout(() => { card.className = 'card flipped-forgot'; }, 20); 
}
function backToLogin() {
    card.className = 'card'; 
    setTimeout(() => {
        if(card.className === 'card') { backFace.style.display = 'none'; forgotFace.style.display = 'none'; }
    }, 800);
}
document.getElementById('go-login-btn1').onclick = backToLogin;
document.getElementById('go-login-btn2').onclick = backToLogin;

// =========================================
// 3. 密码小眼睛控制
// =========================================
const loginPwdInput = document.getElementById('login-pwd');
const toggleLoginPwd = document.getElementById('toggle-login-pwd');
const eyeOpenIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
const eyeCloseIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

toggleLoginPwd.onclick = function() {
    if (loginPwdInput.type === 'password') { loginPwdInput.type = 'text'; toggleLoginPwd.innerHTML = eyeOpenIcon; } 
    else { loginPwdInput.type = 'password'; toggleLoginPwd.innerHTML = eyeCloseIcon; }
}

// =========================================
// 4. 猫娘捂眼交互独立控制
// =========================================
function bindCharToggle(inputEl, char2, char3) {
    inputEl.addEventListener('focus', () => { char2.style.opacity = '0'; char3.style.opacity = '1'; });
    inputEl.addEventListener('blur', () => { char2.style.opacity = '1'; char3.style.opacity = '0'; });
}
bindCharToggle(loginPwdInput, document.getElementById('char2-login'), document.getElementById('char3-login'));
bindCharToggle(document.getElementById('new-pwd'), document.getElementById('char2-forgot'), document.getElementById('char3-forgot'));

const regPwd = document.getElementById('reg-pwd'); const regPwd2 = document.getElementById('reg-pwd2');
const c2Reg = document.getElementById('char2-reg'); const c3Reg = document.getElementById('char3-reg');
function showReg3() { c2Reg.style.opacity = '0'; c3Reg.style.opacity = '1'; }
function showReg2() { c2Reg.style.opacity = '1'; c3Reg.style.opacity = '0'; }
regPwd.addEventListener('focus', showReg3); regPwd2.addEventListener('focus', showReg3);
regPwd.addEventListener('blur', () => { if(document.activeElement !== regPwd2) showReg2(); });
regPwd2.addEventListener('blur', () => { if(document.activeElement !== regPwd) showReg2(); });

// =========================================
// 5. 后端数据库实际登录验证 (间接运行)
// =========================================
async function executeActualLogin() {
    const a = document.getElementById('login-acc').value.trim();
    const p = document.getElementById('login-pwd').value.trim();
    
    showLoading(); 
    const { data, error } = await supabaseClient.from('users').select('*').eq('acc', a);
    hideLoading(); 

    if (error) { alert('数据库连接失败：' + error.message); return; }
    if (!data || data.length === 0) { alert('账号不存在！请先注册。'); return; }
    if (data[0].pwd === p) { alert('登录成功！欢迎回来，' + a); } else { alert('密码错误！'); }
}

// =========================================
// =========================================
// 6. 密码重置逻辑
// =========================================
document.getElementById('do-reset').onclick = async function() {
    const a = document.getElementById('find-acc').value.trim(); 
    const e = document.getElementById('find-email').value.trim();
    const p = document.getElementById('new-pwd').value.trim();
    
    if(!a || !e || !p){ alert('请完整填写信息！'); return; }
    if (p.length < 5) { alert('新密码太短，最少需要 5 个字符！'); return; }
    if (!/[a-zA-Z]/.test(p)) { alert('新密码至少包含一个英文字母！'); return; }
    if (/[\u4e00-\u9fa5]/.test(p)) { alert('新密码不能出现中文！'); return; }

    showLoading(); 
    const { data, error } = await supabaseClient.from('users').select('*').eq('acc', a).eq('email', e);
    if (error || !data || data.length === 0) { hideLoading(); alert('验证失败：账号与邮箱不匹配！'); return; }
    
    const { error: updateError } = await supabaseClient.from('users').update({ pwd: p }).eq('acc', a);
    hideLoading(); 

    if (updateError) { alert('修改失败：' + updateError.message); } 
    else { alert('密码重置成功！为您翻转回登录页。'); backToLogin(); }
}
</script>
</body>
</html>
